# .github/workflows/pages.yml
name: Build & Publish Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.11"
      SPHINX_VERSION: "8.2.3"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install project + docs dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip setuptools wheel

          # Do not blindly install requirements.txt for docs deployment when it
          # contains a Sphinx 9.x pin. Sphinx 9.1.0 requires Python >= 3.12 and
          # breaks Python 3.11 before the docs build starts.
          #
          # Gearsets should use pyproject.toml as the source of truth for runtime
          # dependencies and the docs extra should pin Sphinx to 8.2.3.
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[docs]"
          else
            # Fallback for repos without pyproject.toml:
            # install requirements.txt after removing doc-builder pins that are
            # managed explicitly below.
            if [ -f requirements.txt ]; then
              grep -viE '^(sphinx|furo|alabaster|docutils|snowballstemmer)([=<>!~ ]|$)' requirements.txt > /tmp/gearsets-runtime-requirements.txt || true
              if [ -s /tmp/gearsets-runtime-requirements.txt ]; then
                python -m pip install -r /tmp/gearsets-runtime-requirements.txt
              fi
            fi
            python -m pip install "sphinx==${SPHINX_VERSION}" furo
          fi

          # Belt-and-suspenders: force the deploy-safe Sphinx version even if
          # requirements.txt or a transitive install tried to move it.
          python -m pip install --upgrade --force-reinstall "sphinx==${SPHINX_VERSION}" furo

          python - <<'PY'
          import sphinx
          print("Sphinx version:", sphinx.__version__)
          PY
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1

      - name: Ensure package docs skeletons exist
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          # Gearsets currently exposes the transmissions package.
          # If docs are missing, generate the standard package-level Sphinx
          # skeleton using the CLI helper.
          if [ -d "transmissions" ] && [ ! -d "transmissions/docs" ]; then
            echo "==> Creating transmissions/docs"
            python -m transmissions.cli sphinx-skel transmissions/docs
          fi

      - name: Build all Sphinx projects under package docs folders
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t DOCS < <(find . -maxdepth 4 -type d -name docs | sort)

          if [ "${#DOCS[@]}" -eq 0 ]; then
            echo "No Sphinx docs directories found."
            exit 1
          fi

          for D in "${DOCS[@]}"; do
            echo "==> Building $D"
            if [ -f "$D/Makefile" ]; then
              make -C "$D" html || sphinx-build -b html -W --keep-going "$D" "$D/_build/html"
            else
              sphinx-build -b html -W --keep-going "$D" "$D/_build/html"
            fi
          done

      - name: Assemble site folder
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site
          touch _site/.nojekyll
          : > _site/.docs_routes.txt

          mapfile -t DOCS < <(find . -maxdepth 4 -type d -name docs | sort)

          for D in "${DOCS[@]}"; do
            PKG_PATH="$(dirname "$D")"
            ROUTE="${PKG_PATH#./}"
            DEST="_site/$ROUTE"

            if [ -d "$D/_build/html" ]; then
              echo "==> Copying $ROUTE"
              mkdir -p "$DEST"
              cp -R "$D/_build/html/"* "$DEST/"
              printf '%s\n' "$ROUTE" >> _site/.docs_routes.txt
            else
              echo "==> No built docs for $ROUTE"
            fi
          done

          python - <<'PY'
          from __future__ import annotations

          import html
          from pathlib import Path

          site = Path("_site")
          manifest = site / ".docs_routes.txt"

          if manifest.exists():
              routes = sorted({line.strip() for line in manifest.read_text(encoding="utf-8").splitlines() if line.strip()})
          else:
              routes = []

          # Only routes copied from package-level docs are included. This avoids
          # accidental cards for Sphinx internal pages such as modules/index.html.
          display = {
              "transmissions": (
                  "TX",
                  "Transmissions",
                  "Universal planetary-gearset transmission analysis from JSON topology and shift schedules.",
              ),
          }

          def titleize_token(token: str) -> str:
              acronyms = {
                  "api", "cli", "json", "gui", "tx", "ev", "hev", "at", "cvt", "dct",
                  "zf", "gm", "ford", "ravigneaux", "simpson",
              }
              low = token.lower()
              if low in acronyms:
                  return low.upper()
              return token[:1].upper() + token[1:]

          def titleize(route: str) -> str:
              if route in display:
                  return display[route][1]
              name = route.split("/")[-1]
              cleaned = name.replace("_", " ").replace("-", " ")
              return " ".join(titleize_token(part) for part in cleaned.split()) or route

          def icon_for(route: str, idx: int) -> str:
              if route in display:
                  return display[route][0]
              title = titleize(route)
              words = title.split()
              if len(words) >= 2:
                  return (words[0][0] + words[1][0]).upper()
              if words:
                  return words[0][:2].upper()
              return str(idx + 1)

          def desc_for(route: str) -> str:
              if route in display:
                  return display[route][2]
              low = route.lower()
              title = titleize(route)
              if "transmission" in low:
                  return "Transmission modeling, ratio solving, topology reporting, and reproducible CLI workflows."
              if "gear" in low:
                  return "Gearset modeling utilities and package-level API documentation."
              if "core" in low:
                  return "Core solver internals, data models, and engineering calculation utilities."
              return f"Package-level API documentation and reproducible CLI workflows for {title}."

          def route_sort_key(route: str) -> tuple[int, str]:
              preferred = ["transmissions"]
              top = route.split("/", 1)[0]
              try:
                  rank = preferred.index(top)
              except ValueError:
                  rank = len(preferred)
              return rank, route

          routes = sorted(routes, key=route_sort_key)
          package_count = len(routes)
          first_link = f"{routes[0]}/" if routes else "#"
          first_label = titleize(routes[0]) if routes else "API Reference"

          cards = []
          for idx, route in enumerate(routes):
              title = titleize(route)
              icon = icon_for(route, idx)
              desc = desc_for(route)
              cards.append(f'''                  <a class="card" href="{html.escape(route)}/">
                    <div class="card-top"><span class="icon">{html.escape(icon)}</span><span class="name">{html.escape(title)}</span><span class="route">{html.escape(route)}</span><span class="desc">{html.escape(desc)}</span></div>
                    <div class="card-bottom"><span>Open docs</span><span class="arrow">→</span></div>
                  </a>''')

          package_cards = "\n".join(cards) if cards else "                  <p>No package documentation was found in this build.</p>"

          index = f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="color-scheme" content="dark light">
            <title>Gearsets Docs</title>
            <style>
              :root {{
                --bg-0: #070914;
                --bg-1: #0b1220;
                --bg-2: #111827;
                --card: rgba(255, 255, 255, 0.075);
                --card-strong: rgba(255, 255, 255, 0.12);
                --text: #f8fafc;
                --muted: #a9b6ca;
                --soft: #e0ecff;
                --accent: #38bdf8;
                --accent-2: #a78bfa;
                --accent-3: #f59e0b;
                --accent-4: #22c55e;
                --border: rgba(255, 255, 255, 0.14);
                --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
              }}

              * {{ box-sizing: border-box; }}
              html {{ min-height: 100%; background: var(--bg-0); }}
              body {{
                min-height: 100%;
                margin: 0;
                color: var(--text);
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at 10% 8%, rgba(56, 189, 248, 0.22), transparent 30rem),
                  radial-gradient(circle at 84% 10%, rgba(167, 139, 250, 0.23), transparent 32rem),
                  radial-gradient(circle at 72% 92%, rgba(245, 158, 11, 0.15), transparent 30rem),
                  linear-gradient(135deg, var(--bg-0), var(--bg-1) 44%, var(--bg-2));
              }}

              body::before {{
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                  linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
                background-size: 72px 72px;
                mask-image: linear-gradient(to bottom, rgba(0,0,0,0.78), transparent 78%);
              }}

              a {{ color: inherit; }}
              .shell {{ position: relative; width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 64px; }}
              .nav {{ display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 72px; }}
              .brand {{ display: inline-flex; align-items: center; gap: 12px; font-weight: 850; letter-spacing: -0.035em; }}
              .brand-mark {{ display: grid; place-items: center; width: 42px; height: 42px; border: 1px solid var(--border); border-radius: 14px; background: linear-gradient(145deg, rgba(56,189,248,0.30), rgba(245,158,11,0.20)); box-shadow: 0 16px 48px rgba(56, 189, 248, 0.13); }}
              .brand-mark svg {{ width: 24px; height: 24px; }}
              .nav-pill {{ display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 999px; color: var(--soft); background: rgba(255,255,255,0.055); backdrop-filter: blur(14px); text-decoration: none; font-size: 0.93rem; }}

              .hero {{ display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr); gap: 28px; align-items: stretch; margin-bottom: 34px; }}
              .hero-copy {{ padding: 8px 0 0; }}
              .eyebrow {{ display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px; padding: 8px 12px; border: 1px solid rgba(56, 189, 248, 0.25); border-radius: 999px; color: #d7f3ff; background: rgba(56, 189, 248, 0.08); font-size: 0.92rem; font-weight: 700; }}
              .dot {{ width: 8px; height: 8px; border-radius: 50%; background: var(--accent-4); box-shadow: 0 0 22px var(--accent-4); }}
              h1 {{ max-width: 860px; margin: 0; font-size: clamp(3rem, 8vw, 6.65rem); line-height: 0.92; letter-spacing: -0.085em; }}
              .gradient-text {{ background: linear-gradient(90deg, #ffffff, #dbeafe 30%, #8bdcff 58%, #fde68a 88%); -webkit-background-clip: text; background-clip: text; color: transparent; }}
              .lead {{ max-width: 710px; margin: 26px 0 0; color: var(--muted); font-size: clamp(1.05rem, 2.1vw, 1.34rem); line-height: 1.65; }}
              .actions {{ display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }}
              .button {{ display: inline-flex; align-items: center; justify-content: center; gap: 10px; min-height: 46px; padding: 0 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.075); color: var(--text); text-decoration: none; font-weight: 750; backdrop-filter: blur(12px); transition: transform 160ms ease, border-color 160ms ease, background 160ms ease; }}
              .button.primary {{ border-color: rgba(56, 189, 248, 0.44); background: linear-gradient(135deg, rgba(56, 189, 248, 0.28), rgba(245, 158, 11, 0.16)); }}
              .button:hover {{ transform: translateY(-2px); border-color: rgba(255,255,255,0.36); background: rgba(255,255,255,0.12); }}

              .panel {{ position: relative; overflow: hidden; padding: 24px; border: 1px solid var(--border); border-radius: 32px; background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)), rgba(255,255,255,0.055); box-shadow: var(--shadow); backdrop-filter: blur(18px); }}
              .panel::after {{ content: ""; position: absolute; width: 230px; height: 230px; right: -80px; top: -80px; border-radius: 50%; background: radial-gradient(circle, rgba(245, 158, 11, 0.22), transparent 68%); }}
              .panel-content {{ position: relative; z-index: 1; }}
              .panel-title {{ margin: 0 0 14px; color: var(--soft); font-weight: 800; letter-spacing: -0.03em; }}
              .metric-grid {{ display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 18px 0 20px; }}
              .metric {{ padding: 16px; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; background: rgba(0,0,0,0.18); }}
              .metric strong {{ display: block; font-size: 1.75rem; letter-spacing: -0.06em; }}
              .metric span {{ display: block; margin-top: 3px; color: var(--muted); font-size: 0.9rem; }}
              .code-card {{ margin-top: 14px; padding: 16px; border: 1px solid rgba(56, 189, 248, 0.18); border-radius: 18px; color: #dbf7ff; background: rgba(3, 7, 18, 0.58); font: 0.88rem/1.7 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; overflow-x: auto; }}

              .section-head {{ display: flex; align-items: end; justify-content: space-between; gap: 18px; margin: 48px 0 18px; }}
              h2 {{ margin: 0; font-size: clamp(1.7rem, 3vw, 2.4rem); letter-spacing: -0.055em; }}
              .section-head p {{ max-width: 560px; margin: 0; color: var(--muted); line-height: 1.55; }}
              .grid {{ display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }}
              .card {{ position: relative; display: flex; flex-direction: column; min-height: 205px; padding: 20px; overflow: hidden; border: 1px solid var(--border); border-radius: 26px; background: var(--card); color: var(--text); text-decoration: none; box-shadow: 0 18px 55px rgba(0, 0, 0, 0.18); backdrop-filter: blur(14px); transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease; }}
              .card::before {{ content: ""; position: absolute; inset: 0; opacity: 0; background: radial-gradient(circle at 20% 0%, rgba(56,189,248,0.24), transparent 42%), linear-gradient(135deg, rgba(255,255,255,0.10), transparent 42%); transition: opacity 180ms ease; }}
              .card:hover {{ transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.5); background: var(--card-strong); box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28); }}
              .card:hover::before {{ opacity: 1; }}
              .card-top, .card-bottom {{ position: relative; z-index: 1; }}
              .icon {{ display: grid; place-items: center; width: 42px; height: 42px; margin-bottom: 16px; border-radius: 16px; background: linear-gradient(135deg, rgba(56, 189, 248, 0.22), rgba(245, 158, 11, 0.16)); border: 1px solid rgba(255,255,255,0.12); color: #e8f8ff; font-weight: 900; }}
              .name {{ display: block; margin-bottom: 4px; font-size: 1.08rem; font-weight: 850; letter-spacing: -0.035em; }}
              .route {{ display: block; margin-bottom: 9px; color: rgba(219, 234, 254, 0.64); font-size: 0.82rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }}
              .desc {{ display: block; color: var(--muted); line-height: 1.48; }}
              .card-bottom {{ display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: auto; padding-top: 22px; color: #bdeaff; font-size: 0.92rem; font-weight: 750; }}
              .arrow {{ display: grid; place-items: center; width: 30px; height: 30px; border-radius: 999px; background: rgba(56, 189, 248, 0.12); }}
              footer {{ margin-top: 46px; padding: 22px 0 0; color: rgba(218, 231, 255, 0.64); border-top: 1px solid rgba(255,255,255,0.10); font-size: 0.95rem; }}

              @media (max-width: 940px) {{ .hero {{ grid-template-columns: 1fr; margin-bottom: 22px; }} .grid {{ grid-template-columns: repeat(2, minmax(0, 1fr)); }} }}
              @media (max-width: 640px) {{ .shell {{ width: min(100% - 28px, 1180px); padding-top: 22px; }} .nav {{ margin-bottom: 42px; }} .nav-pill {{ display: none; }} .panel {{ padding: 20px; border-radius: 26px; }} .metric-grid, .grid {{ grid-template-columns: 1fr; }} .section-head {{ display: block; }} .section-head p {{ margin-top: 10px; }} }}
            </style>
          </head>
          <body>
            <div class="shell">
              <nav class="nav" aria-label="Page navigation">
                <div class="brand">
                  <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <circle cx="12" cy="12" r="7.4" stroke="currentColor" stroke-width="1.55"/>
                      <circle cx="12" cy="12" r="2.2" stroke="currentColor" stroke-width="1.55"/>
                      <path d="M12 4.6v3M12 16.4v3M4.6 12h3M16.4 12h3M6.75 6.75l2.1 2.1M15.15 15.15l2.1 2.1M17.25 6.75l-2.1 2.1M8.85 15.15l-2.1 2.1" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
                    </svg>
                  </span>
                  <span>Gearsets Docs</span>
                </div>
                <a class="nav-pill" href="{html.escape(first_link)}">Start with {html.escape(first_label)} →</a>
              </nav>

              <section class="hero">
                <div class="hero-copy">
                  <div class="eyebrow"><span class="dot"></span> Python drivetrain documentation</div>
                  <h1><span class="gradient-text">Gearsets docs</span></h1>
                  <p class="lead">
                    API references for gearset and transmission analysis tools: planetary kinematics,
                    shift-element constraints, topology-driven JSON workflows, ratio solving, and
                    reproducible command-line engineering studies.
                  </p>
                  <div class="actions">
                    <a class="button primary" href="{html.escape(first_link)}">Browse package docs →</a>
                    <a class="button" href="{html.escape(first_link)}">Open {html.escape(first_label)}</a>
                  </div>
                </div>

                <aside class="panel" aria-label="Documentation summary">
                  <div class="panel-content">
                    <p class="panel-title">Toolkit map</p>
                    <div class="metric-grid">
                      <div class="metric"><strong>{package_count}</strong><span>documented package sites</span></div>
                      <div class="metric"><strong>API</strong><span>Sphinx references</span></div>
                      <div class="metric"><strong>JSON</strong><span>topology + schedules</span></div>
                      <div class="metric"><strong>CLI</strong><span>repeatable studies</span></div>
                    </div>
                    <div class="code-card">
                      python -m transmissions.cli sphinx-skel transmissions/docs<br>
                      python -m transmissions.cli --spec in/spec.json --schedule in/schedule.json
                    </div>
                  </div>
                </aside>
              </section>

              <section aria-labelledby="packages-title">
                <div class="section-head">
                  <div><h2 id="packages-title">Package documentation</h2></div>
                  <p>Choose a package below. Each card opens the package-level Sphinx site generated during the GitHub Pages build.</p>
                </div>

                <div class="grid">
          {package_cards}
                </div>
              </section>

              <footer>
                Built with Sphinx 8.2.3 and GitHub Pages from Gearsets package documentation folders.
              </footer>
            </div>
          </body>
          </html>
          '''

          (site / "index.html").write_text(index, encoding="utf-8")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
